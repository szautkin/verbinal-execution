# Tooling config only -- verbinal-execution ships as a container image, not a
# Python package. The helpers in opt/verbinal/ are linted and formatted with
# Ruff against the runtime's Python (python:3.11-slim).

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["globus-cadc", "star-ai-images"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]

[tool.ruff.format]
quote-style = "double"
