name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff / shellcheck / hadolint / actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff==0.15.16

      - name: Ruff lint
        run: ruff check --output-format=github

      - name: Ruff format check
        run: ruff format --check --diff

      # shellcheck is preinstalled on ubuntu-latest runners.
      - name: ShellCheck
        run: shellcheck -s bash opt/verbinal/watcher.sh skaha/startup.sh test/*.sh

      - name: Hadolint
        run: docker run --rm -i hadolint/hadolint:v2.14.0 hadolint - < Dockerfile

      - name: actionlint
        run: |
          docker run --rm -v "$PWD:/repo" --workdir /repo \
            rhysd/actionlint:1.7.12 -color

  build-and-test:
    name: build & test (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: verbinal-execution:ci
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run as a non-root uid to mirror Skaha assigning an arbitrary uid.
      - name: Unit checklist
        run: docker run --rm -u 4321:4321 -v "$PWD":/src:ro --entrypoint bash verbinal-execution:ci /src/test/checklist.sh

      - name: Integration (startup + :5000 + config)
        run: docker run --rm -u 4321:4321 -v "$PWD":/src:ro --entrypoint bash verbinal-execution:ci /src/test/integration.sh

      - name: Imports (science stack)
        run: docker run --rm -u 4321:4321 -v "$PWD":/src:ro --entrypoint bash verbinal-execution:ci /src/test/imports.sh
